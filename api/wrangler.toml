name = "planspiel-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# KV-Namespace für Session-Storage
# Nach `wrangler kv namespace create SESSIONS` die ID hier eintragen:
[[kv_namespaces]]
binding = "SESSIONS"
id      = "40b5cb200ccc4372a2f8ffab88233b29"
# Für lokale Entwicklung (wrangler dev) optional:
# preview_id = "ERSETZEN_MIT_PREVIEW_ID"

[vars]
# Erlaubte Frontend-Ursprünge für CORS (Komma-getrennt)
ALLOWED_ORIGINS = "http://localhost:8080,https://floderso.github.io,https://planspiel.kassensturz.de"
